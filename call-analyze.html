.hdr-r{font-size:11px;color:var(--m);}

.eye{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:3px;color:var(--y);margin-bottom:4px;}

.hsub{font-size:13px;color:var(--m);line-height:1.6;margin-bottom:18px;}

.nav-day:hover:not(.on){border-color:#444;color:#999;}
.stats{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:20px;}
@media(max-width:600px){.stats{grid-template-columns:repeat(3,1fr);}}
.stat{background:#ffffff;border:1px solid #dde3d8;border-radius:10px;padding:14px 16px;text-align:center;}
.stat-n{font-size:22px;font-weight:900;letter-spacing:-1px;line-height:1;}
.stat-l{font-size:9px;color:var(--m);margin-top:4px;font-weight:600;text-transform:uppercase;letter-spacing:1px;}
.stat-d{font-size:9px;margin-top:2px;font-weight:700;}
.top-rep{background:#f7f8f5;border:1.5px solid rgba(34,197,94,.2);border-radius:12px;padding:18px 20px;margin-bottom:16px;}
.top-eye{font-size:9px;font-weight:700;color:var(--g);text-transform:uppercase;letter-spacing:2px;margin-bottom:8px;}
.top-body{font-size:13px;color:#bbb;line-height:1.8;}.top-body strong{color:var(--t);}

.pri-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:7px;}
.trend{background:#ffffff;border:1px solid #dde3d8;border-radius:12px;padding:18px 20px;margin-bottom:20px;}
.trend-eye{font-size:9px;font-weight:700;color:var(--b);text-transform:uppercase;letter-spacing:2px;margin-bottom:12px;}

.trend-name{width:120px;font-weight:700;flex-shrink:0;}

.section-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:var(--m);margin:20px 0 10px;}

.call-score.green{background:rgba(34,197,94,.12);color:var(--g);}
.call-score.yellow{background:rgba(109,190,79,.12);color:var(--y);}
.call-score.red{background:rgba(239,68,68,.12);color:var(--r);}

.call-venue{font-size:12px;color:var(--m);margin-top:1px;}

.tag-g{background:rgba(34,197,94,.1);color:var(--g);}
.tag-r{background:rgba(239,68,68,.1);color:var(--r);}
.arrow{color:#2a2a2a;font-size:10px;transition:transform .2s;flex-shrink:0;}
.call.open .arrow{transform:rotate(180deg);}
.call-detail{display:none;border-top:1px solid #1e1e1e;padding:16px 18px;}
.call.open .call-detail{display:block;}
.crit-row{display:flex;align-items:center;gap:10px;padding:5px 0;border-bottom:1px solid #141414;font-size:12px;}
.crit-row:last-child{border-bottom:none;}

.crit-bar{height:100%;border-radius:3px;}

.crit-coaching{font-size:11px;color:var(--y);padding:1px 0 6px 60px;line-height:1.5;}
.coaching-box{background:#f7f8f5;border-left:3px solid var(--y);padding:12px 16px;margin-top:12px;border-radius:0 8px 8px 0;}
.coaching-title{font-size:9px;font-weight:700;color:var(--y);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:6px;}
.coaching-items{font-size:12px;color:#999;line-height:1.8;}.coaching-items strong{color:var(--t);}
.empty-state{text-align:center;padding:60px 20px;color:#333;font-size:14px;}
.intv{background:#ffffff;border:1px solid #dde3d8;border-radius:12px;padding:18px 20px;margin-bottom:20px;}
.intv-eye{font-size:9px;font-weight:700;color:var(--p);text-transform:uppercase;letter-spacing:2px;margin-bottom:12px;}

.intv-mid{flex:1;color:#bbb;}

var CUR = 'fri';

function init(){
  var nav = document.getElementById('nav');
  var html = '';
  Object.keys(DAYS).forEach(function(k){
    html += '<button class="nav-day'+(k===CUR?' on':'')+'" onclick="switchDay(\''+k+'\')">'+DAYS[k].label+'</button>';
  });
  nav.innerHTML = html;
  renderDay();
}

function switchDay(k){
  CUR = k;
  document.querySelectorAll('.nav-day').forEach(function(b){b.classList.remove('on');});
  event.target.classList.add('on');
  renderDay();
}

function renderDay(){
  var d = DAYS[CUR];
  document.getElementById('brief-eye').textContent = 'Morning call brief · ' + d.date + ' 2026';
  document.getElementById('brief-h1').innerHTML = d.calls + ' calls reviewed overnight <span>· avg ' + d.avg + '</span>';
  document.getElementById('brief-sub').textContent = 'All rep calls from the previous day transcribed, scored against seven criteria, and surfaced with coaching actions before the team arrives.';

  var weekCalls = 0; var weekScore = 0;
  Object.keys(DAYS).forEach(function(k){
    if(Object.keys(DAYS).indexOf(k) <= Object.keys(DAYS).indexOf(CUR)){
      weekCalls += DAYS[k].calls;
      weekScore += DAYS[k].avg * DAYS[k].calls;
    }
  });
  var weekAvg = Math.round(weekScore / weekCalls);

  var html = '';
  html += '<div class="stats">';
  html += '<div class="stat"><div class="stat-n" style="color:var(--y);">'+d.calls+'</div><div class="stat-l">Calls today</div></div>';
  html += '<div class="stat"><div class="stat-n" style="color:'+(d.avg>=60?'var(--g)':d.avg>=45?'var(--y)':'var(--r)')+';">'+d.avg+'</div><div class="stat-l">Avg score</div><div class="stat-d" style="color:'+(d.avg>weekAvg?'var(--g)':'var(--r)')+';">'+(d.avg>weekAvg?'+':'')+(d.avg-weekAvg)+' vs week</div></div>';
  html += '<div class="stat"><div class="stat-n" style="color:var(--g);">'+d.greens+'</div><div class="stat-l">Green calls</div></div>';
  html += '<div class="stat"><div class="stat-n" style="color:var(--r);">'+d.reds+'</div><div class="stat-l">Coaching flags</div></div>';
  html += '<div class="stat"><div class="stat-n" style="color:var(--b);">'+weekCalls+'</div><div class="stat-l">Week total</div></div>';
  html += '</div>';

  html += '<div class="top-rep"><div class="top-eye">Top call of the day · score '+d.top.score+'</div>';
  html += '<div class="top-body"><strong>'+d.top.rep+'</strong> — '+d.top.venue+'. '+d.top.note+'</div></div>';

  html += '<div class="priorities"><div class="pri-eye">Coaching priorities — action required today</div>';
  d.priorities.forEach(function(p){
    html += '<div class="pri-item"><div class="pri-dot" style="background:'+p.col+';"></div><div>'+p.text+'</div></div>';
  });
  html += '</div>';

  if(d.interventions && d.interventions.length){
    html += '<div class="intv"><div class="intv-eye">Coaching interventions logged today</div>';
    d.interventions.forEach(function(iv){
      var badge = iv.type==='call-along'?'ride':iv.type==='slack'?'slack':iv.type==='1:1'?'call1':iv.type==='phone'?'phone':iv.type==='standup'?'standup':'call1';
      html += '<div class="intv-item">';
      html += '<div class="intv-badge '+badge+'">'+iv.type+'</div>';
      html += '<div class="intv-mid"><strong>'+iv.time+' — '+iv.who+'</strong><br>'+iv.note;
      if(iv.outcome) html += '<div class="intv-outcome">'+iv.outcome+'</div>';
      html += '</div></div>';
    });
    html += '</div>';
  }

  html += '<div class="trend"><div class="trend-eye">Rep performance trend · week to date</div>';
  d.trend.forEach(function(t){
    html += '<div class="trend-row"><div class="trend-name">'+t.name+'</div><div class="trend-bars">';
    t.scores.forEach(function(s){
      var c = s>=75?'var(--g)':s>=50?'var(--y)':'var(--r)';
      html += '<div class="trend-bar" style="width:'+Math.max(s*.6,20)+'px;background:'+c+'22;color:'+c+';">'+s+'</div>';
    });
    html += '</div><div class="trend-avg" style="color:'+t.col+';">'+t.avg+'</div></div>';
  });
  html += '</div>';

  html += '<div class="section-label">All calls · ' + d.date + ' · click to expand</div>';

  d.calls_list = d.calls_list || d.calls;
  (d.calls_list || d.calls).forEach(function(c){
    html += '<div class="call" onclick="this.classList.toggle(\'open\')">';
    html += '<div class="call-top">';
    html += '<div class="call-score '+c.grade+'">'+c.score+'</div>';
    html += '<div class="call-mid"><div class="call-rep">'+c.rep+'</div><div class="call-venue">'+c.venue+'</div><div class="call-meta">'+c.time+' · '+c.dur+' min</div></div>';
    html += '<div class="call-tags">';
    c.criteria.forEach(function(cr){if(cr.score===0) html += '<span class="tag tag-r">'+cr.label+'</span>';});
    html += '</div><div class="arrow">▾</div></div>';

    html += '<div class="call-detail">';
    html += '<div style="font-size:13px;color:#aaa;line-height:1.7;margin-bottom:14px;">'+c.summary+'</div>';
    c.criteria.forEach(function(cr){
      var col = cr.score>=80?'var(--g)':cr.score>=40?'var(--y)':'var(--r)';
      html += '<div class="crit-row"><div class="crit-bar-wrap"><div class="crit-bar" style="width:'+cr.score+'%;background:'+col+';"></div></div>';
      html += '<div class="crit-label">'+cr.label+'</div><div class="crit-score" style="color:'+col+';">'+cr.score+'</div></div>';
      if(cr.ev) html += '<div class="crit-evidence">'+cr.ev+'</div>';
      if(cr.co && cr.score<100) html += '<div class="crit-coaching">&#8594; '+cr.co+'</div>';
    });
    html += '<div class="coaching-box"><div class="coaching-title">Actions</div><div class="coaching-items">';
    c.actions.forEach(function(a){html += '&#8226; '+a+'<br>';});
    html += '</div></div></div></div>';
  });

  document.getElementById('content').innerHTML = html;
}

init();
</script>
